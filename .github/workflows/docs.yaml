name: Documentation

on:
  release:
    types: [published]
  pull_request:
    branches: [main]
    paths:
      - 'packages/libs/dapp-kit/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/docs.yaml'

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate TypeDoc documentation
        working-directory: packages/libs/dapp-kit
        run: bun run docs
        env:
          CI: true

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/libs/dapp-kit/docs/api

  deploy-docs:
    needs: build-docs
    if: github.event_name == 'release'  # Only deploy on release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
