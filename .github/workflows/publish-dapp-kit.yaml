name: Publish dapp-kit to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-github-packages:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://npm.pkg.github.com"

      - name: Install dependencies
        timeout-minutes: 2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify release tag matches package version
        working-directory: packages/libs/dapp-kit
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_VERSION="dapp-kit/v${PACKAGE_VERSION}"

          if [ "$GITHUB_REF_NAME" != "$RELEASE_VERSION" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match @evefrontier/dapp-kit version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Test dapp-kit
        run: bun --filter @evefrontier/dapp-kit test:run

      - name: Build dapp-kit
        run: bun --filter @evefrontier/dapp-kit build

      - name: Configure registry auth
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Publish to GitHub Packages
        working-directory: packages/libs/dapp-kit
        run: |
          bun publish --registry=https://npm.pkg.github.com --ignore-scripts --no-git-checks
