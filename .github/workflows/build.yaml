name: Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'bun.lock'
      - 'package.json'
      - 'biome.jsonc'
      - 'nx.json'
      - 'tsconfig.json'
      - '.github/workflows/build.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx nx run-many -t lint --verbose --nxBail=true
        env:
          CI: true

      - name: Test
        run: |
          bun --filter @evefrontier/dapp-kit test:run
        env:
          CI: true

      - name: Build packages
        run: |
          bunx nx run-many -t build --verbose --nxBail=true
          bunx nx run assembly:ci:build --verbose --nxBail=true
        env:
          CI: true
